# https://github.com/julia-actions/cache#usage
name: CI

on:
  push:
    paths-ignore:
      - README.md
      - 'docs/**'
  pull_request:

# needed to allow julia-actions/cache to delete old caches that it has created
permissions:
  actions: write
  contents: read

jobs:
  Test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        julia-version: [1.12.6]         # 2026-04-09
        julia-arch: [x64]
        os: [ubuntu-latest]
        include:
          - julia-version: nightly
            os: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: julia-actions/setup-julia@v1
      with:
        version: ${{ matrix.julia-version }}
    - uses: julia-actions/cache@v1
    - uses: julia-actions/julia-buildpkg@v1
    - name: gen/check_for_updates_using_sugar_cubes.jl
      run: |
        git clone --depth=1 --filter=blob:none --sparse https://github.com/JuliaLang/julia sources
        cd sources/
        git sparse-checkout set base JuliaSyntax
        cd ../

        git clone --depth=1 https://github.com/wookay/SugarCubes.jl SugarCubes.jl
        cd SugarCubes.jl/
        ln -s ../sources/
        cd ../
        julia -e 'using Pkg; Pkg.develop(path="SugarCubes.jl")'

        cd gen/
        julia --color=yes check_for_updates_using_sugar_cubes.jl
        cd ../
    - uses: julia-actions/julia-runtest@v1
